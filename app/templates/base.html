<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Trendsee{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Trendsee</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Каталог</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/trends">Админ</a>
                    </li>
                    <li class="nav-item">
                        <span class="nav-link" id="balance-display">Баланс: <span id="balance-value">-</span></span>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="py-4">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="bg-light py-3 mt-5">
        <div class="container text-center text-muted">
            <p>&copy; 2024 Trendsee. Все права защищены.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Fetch and update balance
        async function updateBalance() {
            try {
                const response = await fetch('/balance');
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('balance-value').textContent = data.balance;
                }
            } catch (error) {
                console.error('Error fetching balance:', error);
            }
        }

        // Update balance on page load
        document.addEventListener('DOMContentLoaded', updateBalance);
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
